<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Nuvana.ex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center overflow-hidden relative">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[150px] opacity-30 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500 rounded-full mix-blend-multiply filter blur-[150px] opacity-20 pointer-events-none"></div>

    <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md z-10 border-t border-l border-slate-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-widest text-blue-400 mb-2">NUVANA.EX</h1>
            <p class="text-slate-400 text-sm">Enterprise Resource Planning</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-2">Username</label>
                <input type="text" id="loginUser" required placeholder="e.g. admin" class="w-full bg-slate-800 bg-opacity-70 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition shadow-inner">
            </div>
            <div>
                <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-2">Password</label>
                <input type="password" id="loginPass" required class="w-full bg-slate-800 bg-opacity-70 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition shadow-inner">
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-500 hover:to-teal-400 text-white font-bold py-3.5 rounded-lg transition shadow-lg shadow-blue-500/30 flex justify-center items-center mt-4">
                <span id="loginBtnText">Secure Login</span>
                <svg id="loginLoadingIcon" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-xs text-slate-500 uppercase tracking-widest">Authorized Personnel Only</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
