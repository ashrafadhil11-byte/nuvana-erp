<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts & Ledger - Nuvana.ex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex overflow-hidden">

    <aside class="w-64 glass-panel border-r border-slate-700 transition-all duration-300 flex flex-col z-20">
        <div class="p-6 flex justify-between items-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">NUVANA.EX</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="index.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Dashboard</a>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>New Booking</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="international.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">International</a>
                    <a href="domestic.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Domestic</a>
                </div>
            </div>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>Processing</span>
                    <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="processing.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Manage Bookings</a>
                    <a href="update.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Process Update</a>
                </div>
            </div>

            <a href="accounts.html" class="block px-4 py-2 rounded-lg bg-emerald-600 bg-opacity-20 text-emerald-400 border border-emerald-500 border-opacity-30 transition font-bold">Accounts</a>
            <a href="customers.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Customers</a>
            <a href="reports.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Reports</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 glass-panel border-b border-slate-700 flex items-center justify-between px-8 z-10">
            <h2 class="text-lg font-semibold text-slate-200">Financial Ledger</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-400">Branch: HQ</span>
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto relative flex flex-col md:flex-row gap-8">
            <div class="absolute top-0 right-0 w-64 h-64 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[120px] opacity-20 pointer-events-none"></div>

            <div class="w-full md:w-1/3 glass-panel p-6 rounded-xl border-t border-l border-slate-600 shadow-2xl h-fit relative z-10">
                <h3 class="text-xl font-semibold text-white mb-4">Log Transaction</h3>
                
                <form id="transactionForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Transaction Type</label>
                        <select id="transType" required class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-emerald-500 transition appearance-none">
                            <option value="Income">Income (Money In)</option>
                            <option value="Expense">Expense (Money Out)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Category</label>
                        <select id="transCategory" required class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-emerald-500 transition appearance-none">
                            <option value="Booking Payment">Booking Payment</option>
                            <option value="Fuel & Transport">Fuel & Transport</option>
                            <option value="Packaging Materials">Packaging Materials</option>
                            <option value="Office Expense">Office Expense</option>
                            <option value="Salary / Wages">Salary / Wages</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Amount (OMR/USD)</label>
                        <input type="number" step="0.01" id="transAmount" required placeholder="0.00" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-emerald-500 transition">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Reference AWB (Optional)</label>
                        <input type="text" id="transAwb" placeholder="Leave blank if N/A" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-white font-mono focus:outline-none focus:border-emerald-500 transition">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Description</label>
                        <input type="text" id="transDesc" placeholder="Brief note..." class="w-full bg-slate-800 border border-slate-600 rounded-lg p-2.5 text-white focus:outline-none focus:border-emerald-500 transition">
                    </div>

                    <button type="submit" id="transBtn" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold py-3.5 rounded-lg transition shadow-lg shadow-emerald-500/30 flex justify-center items-center mt-2">
                        <span id="transBtnText">Save Record</span>
                    </button>
                </form>
            </div>

            <div class="w-full md:w-2/3 glass-panel rounded-xl border-t border-l border-slate-600 shadow-2xl flex flex-col relative z-10">
                <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800 bg-opacity-40">
                    <h3 class="text-xl font-semibold text-white">Recent Transactions</h3>
                    <button id="refreshLedgerBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition flex items-center">
                        Refresh
                    </button>
                </div>
                
                <div class="flex-1 overflow-auto p-0">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900 bg-opacity-80 sticky top-0 z-10 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                            <tr>
                                <th class="p-4 border-b border-slate-700">Date</th>
                                <th class="p-4 border-b border-slate-700">Type</th>
                                <th class="p-4 border-b border-slate-700">Category</th>
                                <th class="p-4 border-b border-slate-700 text-right">Amount</th>
                                <th class="p-4 border-b border-slate-700">Ref AWB</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerTableBody" class="divide-y divide-slate-800 text-sm text-slate-300">
                            <tr><td colspan="5" class="p-8 text-center text-slate-500">Loading financial data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
