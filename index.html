<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana.ex ERP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* The custom glassmorphism effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 glass-panel border-r border-slate-700 transition-all duration-300 flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">NUVANA.EX</h1>
            <button id="menu-toggle" class="text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="#" class="block px-4 py-2 rounded-lg bg-blue-600 bg-opacity-20 text-blue-400 border border-blue-500 border-opacity-30">Dashboard</a>
            
            <div class="group">
                <button class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>New Booking</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="#" class="block px-2 py-1 text-sm text-slate-400 hover:text-white">International</a>
                    <a href="#" class="block px-2 py-1 text-sm text-slate-400 hover:text-white">Domestic</a>
                </div>
            </div>
            
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Processing</a>
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Accounts</a>
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Reports</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 glass-panel border-b border-slate-700 flex items-center justify-between px-8">
            <h2 class="text-lg font-semibold text-slate-200">Global Overview</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-400">Branch: HQ</span>
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Active Shipments</h3>
                    <p class="text-3xl font-bold text-white">1,204</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Pending Consolidations</h3>
                    <p class="text-3xl font-bold text-yellow-400">18</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">System Status</h3>
                    <p class="text-3xl font-bold text-green-400">Online</p>
                </div>
            </div>
            
            <div class="glass-panel p-8 rounded-xl border-t border-l border-slate-600 shadow-2xl relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <h3 class="text-xl font-semibold text-white mb-6">New Domestic Booking</h3>
    
    <form id="bookingForm" class="relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">AWB Number</label>
                    <input type="text" id="awb" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Sender Name</label>
                    <input type="text" id="senderName" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Sender Phone</label>
                    <input type="tel" id="senderPhone" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Weight (KG)</label>
                        <input type="number" step="0.01" id="weight" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Dest. Pincode</label>
                        <input type="text" id="pincode" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Receiver Name</label>
                    <input type="text" id="receiverName" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Receiver Phone</label>
                    <input type="tel" id="receiverPhone" required class="w-full bg-slate-800 bg-opacity-50 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="mt-8 w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3.5 rounded-lg transition shadow-lg shadow-blue-500/30 flex justify-center items-center">
            <span id="btnText">Transmit to Database</span>
            <svg id="loadingIcon" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
        <p class="text-xs text-slate-400 text-center mt-4">Note: Standard delivery schedules starting from the 5th day of dispatch.</p>
    </form>
</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
