<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana.ex ERP - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex overflow-hidden">

    <aside class="w-64 glass-panel border-r border-slate-700 transition-all duration-300 flex flex-col z-20">
        <div class="p-6 flex justify-between items-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">NUVANA.EX</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="index.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Dashboard</a>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>New Booking</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="international.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">International</a>
                    <a href="domestic.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Domestic</a>
                </div>
            </div>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>Processing</span>
                    <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="processing.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Manage Bookings</a>
                    <a href="update.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Process Update</a>
                </div>
            </div>

            <a href="accounts.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Accounts</a>
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Reports</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 glass-panel border-b border-slate-700 flex items-center justify-between px-8 z-10">
            <h2 class="text-lg font-semibold text-slate-200">Global Overview</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-400">Branch: HQ</span>
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto relative">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Active Shipments</h3>
                    <p class="text-3xl font-bold text-white">1,204</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Pending Consolidations</h3>
                    <p class="text-3xl font-bold text-yellow-400">18</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">System Status</h3>
                    <p class="text-3xl font-bold text-green-400">Online</p>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
