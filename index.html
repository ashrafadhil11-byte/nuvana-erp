<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana.ex ERP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* The custom glassmorphism effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 glass-panel border-r border-slate-700 transition-all duration-300 flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">NUVANA.EX</h1>
            <button id="menu-toggle" class="text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="#" class="block px-4 py-2 rounded-lg bg-blue-600 bg-opacity-20 text-blue-400 border border-blue-500 border-opacity-30">Dashboard</a>
            
            <div class="group">
                <button class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>New Booking</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="#" class="block px-2 py-1 text-sm text-slate-400 hover:text-white">International</a>
                    <a href="#" class="block px-2 py-1 text-sm text-slate-400 hover:text-white">Domestic</a>
                </div>
            </div>
            
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Processing</a>
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Accounts</a>
            <a href="#" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Reports</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 glass-panel border-b border-slate-700 flex items-center justify-between px-8">
            <h2 class="text-lg font-semibold text-slate-200">Global Overview</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-400">Branch: HQ</span>
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Active Shipments</h3>
                    <p class="text-3xl font-bold text-white">1,204</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">Pending Consolidations</h3>
                    <p class="text-3xl font-bold text-yellow-400">18</p>
                </div>
                <div class="glass-panel p-6 rounded-xl">
                    <h3 class="text-sm text-slate-400 mb-1">System Status</h3>
                    <p class="text-3xl font-bold text-green-400">Online</p>
                </div>
            </div>
            
            <div class="glass-panel h-96 rounded-xl flex items-center justify-center text-slate-500 border-dashed border-2 border-slate-600">
                [ 3D Tracking Interface / Data Table Placeholder ]
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
