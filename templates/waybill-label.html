<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana Express - Waybill Label</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* Strict 4x6 inch Thermal Label formatting */
        @page { size: 4in 6in; margin: 0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #e5e5e5; display: flex; justify-content: center; padding: 20px; }
        
        .label-container {
            width: 4in; height: 6in; background: #fff; padding: 0.15in; border: 2px solid #000;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            page-break-after: always;
        }

        /* 1. Header (Brand & Service) */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #000; padding-bottom: 0.05in; margin-bottom: 0.05in; }
        .brand { font-size: 16pt; font-weight: 900; letter-spacing: -0.02em; }
        .service-code { font-size: 10pt; font-weight: bold; background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; }

        /* 2. Master Barcode Zone (Large) */
        .master-zone { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 0.05in; margin-bottom: 0.05in; }
        .zone-title { font-size: 7pt; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .master-barcode { width: 100%; height: auto; max-height: 0.8in; }

        /* 3. Routing (From / To) */
        .routing-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 0.1in; flex: 1; border-bottom: 2px solid #000; padding-bottom: 0.05in; margin-bottom: 0.05in; }
        .address-block { display: flex; flex-direction: column; gap: 2px; }
        .block-title { font-size: 8pt; font-weight: 900; background: #000; color: #fff; padding: 2px 4px; display: inline-block; width: max-content; margin-bottom: 2px; }
        .name { font-size: 10pt; font-weight: bold; line-height: 1.1; }
        .address { font-size: 8pt; line-height: 1.2; }
        .phone { font-size: 8pt; font-weight: bold; margin-top: auto; }

        /* 4. Details & Child Barcode (Bottom Split) */
        .details-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 0.1in; align-items: center; margin-bottom: 0.05in; }
        .shipment-details { font-size: 8pt; line-height: 1.4; }
        .detail-row { display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; }
        .detail-row span { color: #333; }
        .detail-row strong { font-weight: bold; }
        
        .child-zone { text-align: center; border-left: 2px dashed #000; padding-left: 0.1in; }
        .child-barcode { width: 100%; height: auto; max-height: 0.5in; }

        /* 5. Footer (Destination & Date) */
        .footer { display: flex; justify-content: space-between; align-items: center; border-top: 3px solid #000; padding-top: 0.05in; margin-top: auto; }
        .dest-code { font-size: 22pt; font-weight: 900; letter-spacing: 0.05em; }
        .date-code { font-size: 8pt; font-weight: bold; text-align: right; }

        /* Hide body background when printing */
        @media print { body { background: none; padding: 0; } .label-container { box-shadow: none; border: none; } }
    </style>
</head>
<body>

    <div class="label-container" id="labelTemplate">
        <div class="header">
            <div class="brand">NUVANA EXPRESS</div>
            <div class="service-code" id="lblService">AIR-EXP</div>
        </div>

        <div class="master-zone">
            <div class="zone-title">Master Airway Bill</div>
            <svg class="master-barcode" id="masterBarcode"></svg>
        </div>

        <div class="routing-zone">
            <div class="address-block">
                <div class="block-title">FROM</div>
                <div class="name" id="lblShipperName">Shipper Name</div>
                <div class="address" id="lblShipperAddress">Address Line 1<br>City, State<br>Country, Zip</div>
                <div class="phone" id="lblShipperPhone">+971 50 123 4567</div>
            </div>
            <div class="address-block">
                <div class="block-title">TO</div>
                <div class="name" id="lblConsigneeName">Consignee Name</div>
                <div class="address" id="lblConsigneeAddress">Address Line 1<br>City, State<br>Country, Zip</div>
                <div class="phone" id="lblConsigneePhone">+91 987 654 3210</div>
            </div>
        </div>

        <div class="details-zone">
            <div class="shipment-details">
                <div class="detail-row"><span>Weight:</span> <strong id="lblWeight">15.5 kg</strong></div>
                <div class="detail-row"><span>Chargeable:</span> <strong id="lblCW">16.0 kg</strong></div>
                <div class="detail-row"><span>Dims:</span> <strong id="lblDims">40x40x50</strong></div>
                <div class="detail-row"><span>Item:</span> <strong id="lblCommodity">Electronics</strong></div>
            </div>
            <div class="child-zone">
                <div class="zone-title" id="lblBoxCount">Box 1 of 3</div>
                <svg class="child-barcode" id="childBarcode"></svg>
            </div>
        </div>

        <div class="footer">
            <div class="dest-code" id="lblDestCode">IND</div>
            <div class="date-code" id="lblDate">25-APR-2026<br>HQ-01</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Fetch the label data temporarily saved by international.html
            const printDataRaw = localStorage.getItem('nuvana_print_data');
            
            if (printDataRaw) {
                const data = JSON.parse(printDataRaw);
                
                // Set text fields
                document.getElementById('lblService').innerText = data.service;
                document.getElementById('lblShipperName').innerText = data.shipperName;
                document.getElementById('lblShipperAddress').innerHTML = `${data.shipperAddress}<br>${data.shipperCity}, ${data.shipperState}<br>${data.originCountry} ${data.postalCode}`;
                document.getElementById('lblShipperPhone').innerText = data.shipperPhone;
                
                document.getElementById('lblConsigneeName').innerText = data.consigneeName;
                document.getElementById('lblConsigneeAddress').innerHTML = `${data.receiverAddress}<br>${data.consigneeCity}, ${data.consigneeState}<br>${data.destCountry} ${data.zipCode}`;
                document.getElementById('lblConsigneePhone').innerText = data.consigneePhone;
                
                document.getElementById('lblWeight').innerText = `${data.boxWeight} kg`;
                document.getElementById('lblCW').innerText = `${data.boxCw} kg`;
                document.getElementById('lblDims').innerText = `${data.boxDims} cm`;
                document.getElementById('lblCommodity').innerText = data.commodity;
                document.getElementById('lblBoxCount').innerText = `Box ${data.currentBox} of ${data.totalBoxes}`;
                document.getElementById('lblDestCode').innerText = data.destCountry.substring(0, 3).toUpperCase();
                document.getElementById('lblDate').innerHTML = `${new Date().toLocaleDateString('en-GB').replace(/\//g, '-')}<br>NUVEX`;

                // 🚀 GENERATE THE BARCODES
                // Master Barcode: Thick, large, highly readable
                JsBarcode("#masterBarcode", data.masterAwb, {
                    format: "CODE128",
                    width: 2.5,
                    height: 70,
                    displayValue: true,
                    fontSize: 16,
                    fontOptions: "bold",
                    margin: 0
                });

                // Child Barcode: Thinner, compact, focused on the specific box
                JsBarcode("#childBarcode", data.childAwb, {
                    format: "CODE128",
                    width: 1.5,
                    height: 40,
                    displayValue: true,
                    fontSize: 12,
                    margin: 0
                });

                // Automatically trigger print dialog once loaded
                setTimeout(() => { window.print(); }, 500);
            }
        });
    </script>
</body>
</html>
