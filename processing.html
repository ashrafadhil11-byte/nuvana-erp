<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana.ex ERP — Manage Bookings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>document.documentElement.classList.remove('dark');</script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { orange:'#F99523',teal:'#027385',beige:'#EFE7DC',charcoal:'#0D2330',success:'#10B981', danger:'#ef4444' }, fontFamily:{ poppins:['Poppins','sans-serif'],lexend:['Lexend','sans-serif'] } } }
        }
    </script>
    <style>
        *{box-sizing:border-box;} body{font-family:'Poppins',sans-serif;background:#f5f2ee;} .font-lexend{font-family:'Lexend',sans-serif;}
        @keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeRow{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .anim-1{animation:slideUp .4s cubic-bezier(.16,1,.3,1) .05s both;} .anim-2{animation:slideUp .4s cubic-bezier(.16,1,.3,1) .1s both;}
        .spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
        .fade-row{animation:fadeRow .25s ease both;}
        
        ::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(2,115,133,.18);border-radius:10px;}
        
        .tab-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Lexend',sans-serif;border:none;}
        .tab-dom{background:#027385;color:white;box-shadow:0 3px 10px rgba(2,115,133,.3);}
        .tab-int{background:#F99523;color:white;box-shadow:0 3px 10px rgba(249,149,35,.3);}
        .tab-off{background:transparent;color:rgba(13,35,48,.4);} .tab-off:hover{background:rgba(2,115,133,.06);color:#0D2330;}
        
        .search-input{background:white;border:1px solid #e8e0d6;border-radius:10px;padding:.5rem .85rem .5rem 2.2rem;font-family:'Poppins',sans-serif;font-size:.8rem;color:#0D2330;outline:none;width:240px;transition:all .2s;}
        .search-input:focus{border-color:#F99523;box-shadow:0 0 0 3px rgba(249,149,35,.1);width:280px;}
        
        .data-table{width:100%;border-collapse:separate; border-spacing: 0 8px;}
        .data-table thead th{padding:0 16px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(2,115,133,.55);border-bottom:1px solid #e8e0d6;}
        .data-table tbody tr{background:white;box-shadow:0 2px 8px rgba(13,35,48,.04);transition:transform .2s, box-shadow .2s; border-radius: 12px;}
        .data-table tbody tr:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(13,35,48,.08);}
        .data-table tbody td{padding:14px 16px;font-size:13px;color:#374151; vertical-align: middle;}
        .data-table tbody td:first-child{border-top-left-radius: 12px; border-bottom-left-radius: 12px;}
        .data-table tbody td:last-child{border-top-right-radius: 12px; border-bottom-right-radius: 12px;}
        
        .badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;font-family:'Lexend',sans-serif;white-space:nowrap;}
        .bp{background:#fef9c3;color:#a16207;} .bt{background:#dbeafe;color:#1d4ed8;} .bh{background:#f3e8ff;color:#7e22ce;}
        .bd{background:#dcfce7;color:#15803d;} .be{background:#fee2e2;color:#b91c1c;} .bo{background:#ffedd5;color:#c2410c;}
        
        .avatar-circle {width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; font-family:'Lexend',sans-serif;}
        
        .action-btn {width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; cursor:pointer;}
        .ab-wa   {background:rgba(34,197,94,0.1); color:#22c55e;} .ab-wa:hover {background:#22c55e; color:white;}
        .ab-lbl  {background:rgba(139,92,246,0.1); color:#8b5cf6;} .ab-lbl:hover {background:#8b5cf6; color:white;}
        .ab-inv  {background:rgba(59,130,246,0.1); color:#3b82f6;} .ab-inv:hover {background:#3b82f6; color:white;}
        .ab-view {background:rgba(2,115,133,0.1); color:#027385;} .ab-view:hover {background:#027385; color:white;}
        .ab-edit {background:rgba(249,149,35,0.1); color:#F99523;} .ab-edit:hover {background:#F99523; color:white;}
        .ab-del  {background:rgba(239,68,68,0.1); color:#ef4444;} .ab-del:hover {background:#ef4444; color:white;}

        .detail-drawer{position:fixed;right:0;top:0;bottom:0;width:400px;background:white;box-shadow:-8px 0 32px rgba(13,35,48,.1);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);}
        .detail-drawer.open{transform:translateX(0);}
        .drawer-overlay{position:fixed;inset:0;background:rgba(13,35,48,.25);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s;}
        .drawer-overlay.open{opacity:1;pointer-events:all;}
        
        .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #f0ece6;gap:12px;}
        .detail-row:last-child{border-bottom:none;}
        .d-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(2,115,133,.5);flex-shrink:0;}
        .d-value{font-size:13px;font-weight:600;color:#0D2330;text-align:right;}

        .modal-card {background:white; border-radius:20px; width:100%; max-width:550px; box-shadow:0 20px 40px rgba(0,0,0,0.2); padding:24px; position:relative;}
        .field-modal {width:100%; background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:13px; outline:none; transition:border 0.2s;}
        .field-modal:focus {border-color:#F99523;}
    </style>
</head>
<body class="min-h-screen flex overflow-hidden">

<div id="global-sidebar-container" class="flex-shrink-0 z-20"></div>

<div class="drawer-overlay" id="drawerOverlay"></div>

<div class="detail-drawer" id="detailDrawer">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid #f0ece6;background:#faf8f5;">
        <div>
            <h3 class="font-lexend text-lg font-bold text-charcoal" id="drawerTitle">Details</h3>
            <p class="text-[11px] text-teal/60 mt-0.5" id="drawerSub">—</p>
        </div>
        <button id="closeDrawer" style="width:36px;height:36px;border-radius:50%;background:rgba(13,35,48,.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;">
            <svg style="width:16px;height:16px;color:#0D2330;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px;" id="drawerBody"></div>
    <div style="padding:20px;border-top:1px solid #f0ece6;background:#faf8f5;">
        <a href="update.html" class="w-full py-3 rounded-xl bg-charcoal text-white font-lexend text-sm font-bold flex justify-center items-center gap-2 hover:bg-charcoal/90 transition shadow-lg">
            Scan & Update Checkpoint
        </a>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-charcoal/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="modal-card">
        <h2 class="font-lexend text-lg font-bold text-charcoal mb-1">Complete Booking Edit</h2>
        <p class="text-xs text-teal/60 mb-5" id="editModalAwb">AWB: —</p>
        
        <form id="editForm" class="space-y-4">
            <input type="hidden" id="editAwb">
            <input type="hidden" id="editType">
            
            <div class="grid grid-cols-2 gap-4">
                <div><label class="d-label">Sender Name</label><input type="text" id="editSender" class="field-modal mt-1" required></div>
                <div><label class="d-label">Sender Phone</label><input type="text" id="editSPhone" class="field-modal mt-1" required></div>
                <div><label class="d-label">Receiver Name</label><input type="text" id="editReceiver" class="field-modal mt-1" required></div>
                <div><label class="d-label">Receiver Phone</label><input type="text" id="editRPhone" class="field-modal mt-1" required></div>
                <div><label class="d-label">Total Weight / Chargeable</label><input type="text" id="editWeight" class="field-modal mt-1" required></div>
                <div><label class="d-label">Grand Total</label><input type="text" id="editTotal" class="field-modal mt-1" required></div>
                
                <div class="col-span-2">
                    <label class="d-label">Shipment Status</label>
                    <select id="editStatus" class="field-modal mt-1" required>
                        <option value="Booked">Booked</option>
                        <option value="Dispatched to Hub">Dispatched to Hub</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Out for Delivery">Out for Delivery</option>
                        <option value="Delivered">Delivered</option>

            <div class="flex gap-3 pt-4 border-t border-gray-100">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold text-sm hover:bg-gray-200 transition">Cancel</button>
                <button type="submit" id="editSaveBtn" class="flex-1 py-2.5 rounded-lg bg-orange text-white font-bold text-sm hover:bg-orange/90 transition shadow-md">Save Master Record</button>
            </div>
        </form>
    </div>
</div>

<main style="flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;">
    <header class="h-[62px] flex items-center justify-between px-8 flex-shrink-0 z-10" style="background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid #e8e0d6;">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-[10px] flex items-center justify-center bg-teal/10 text-teal">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M3.375 3C2.339 3 1.5 3.84 1.5 4.875v.75c0 1.036.84 1.875 1.875 1.875h17.25c1.035 0 1.875-.84 1.875-1.875v-.75C22.5 3.839 21.66 3 20.625 3H3.375z"/><path fill-rule="evenodd" d="M3.087 9l.54 9.176A3 3 0 006.622 21h10.757a3 3 0 002.995-2.824L20.913 9H3.087z" clip-rule="evenodd"/></svg>
            </div>
            <div>
                <h2 class="font-lexend text-[14px] font-semibold text-charcoal">Logistics Queue</h2>
                <p class="text-[10px] text-teal/60">Manage your active shipments and tracking records</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background:#f0ece6;border:1px solid #ddd5c8;">
                <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                <span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0D2330;" id="branchDisplayBadge">API Online</span>
            </div>
        </div>
    </header>

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;padding:24px;gap:20px;">
        <div class="flex items-center justify-between anim-1">
            <div class="flex items-center gap-2 p-1.5 rounded-xl bg-[#e8e0d6]">
                <button id="toggleDomBtn" class="tab-btn tab-dom">Domestic Queue</button>
                <button id="toggleIntBtn" class="tab-btn tab-off">International Queue</button>
            </div>
            <div class="flex items-center gap-3">
                <div style="position:relative;">
                    <svg class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-teal/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Search AWB or Name..." class="search-input">
                </div>
                <button onclick="window.fetchBookings()" class="px-4 py-2 bg-white border border-[#e8e0d6] rounded-xl text-xs font-bold text-charcoal hover:bg-gray-50 transition shadow-sm">
                    Refresh
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto pr-2 anim-2">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="w-[15%]">Waybill (AWB)</th>
                        <th class="w-[20%]">Shipper</th>
                        <th class="w-[10%] text-center">Route</th>
                        <th class="w-[20%]">Receiver</th>
                        <th class="w-[10%] text-center">Status</th>
                        <th class="w-[25%] text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="6" class="text-center py-10"><div class="animate-pulse text-teal/40 text-xs font-bold uppercase tracking-widest">Loading Records...</div></td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="flex justify-between items-center text-xs text-teal/50 font-semibold px-2">
            <span id="rowCountLabel">Loading...</span>
        </div>
    </div>
</main>

<script src="data/countries.js"></script>
<script src="app.js"></script>

<script>
// Replace this with your exact Script URL
const SCRIPT_URL = (typeof _globalConfig !== 'undefined') ? _globalConfig.scriptURL : 'https://script.google.com/macros/s/AKfycbweIJLcyZTR619HQgD3IJvHI2Dn-3EnT7WEo3g0pKeCsPdPZCeSnhyonP_1QQjd5pQw/exec';
let currentView = 'domestic';
let allRows = [];

// Session & Branch Setup
const rawSession = sessionStorage.getItem('erp_user');
let userBranch = 'UNKNOWN';
let userRole = 'User';
if (rawSession) {
    try {
        const u = JSON.parse(rawSession);
        userBranch = u.branchId || 'UNKNOWN';
        userRole = u.role || 'User';
        document.getElementById('branchDisplayBadge').textContent = `Branch: ${userBranch}`;
    } catch(e) {}
}

// Country & Emoji Helper
function getFlagEmoji(countryCode) {
    if(!countryCode || countryCode.length !== 2) return '';
    const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
    return String.fromCodePoint(...codePoints);
}

function getCountryDetails(countryName) {
    if(!countryName) return { name: '—', alpha3: '---', flag: '' };
    if (typeof COUNTRY_MASTER !== 'undefined') {
        const found = COUNTRY_MASTER.find(c => c.name.toLowerCase() === countryName.toLowerCase().trim());
        if (found) return { name: found.name, alpha3: found.alpha3, flag: getFlagEmoji(found.code) };
    }
    return { name: countryName, alpha3: countryName.substring(0,3).toUpperCase(), flag: '🌍' };
}

// Formatting Helpers
function badge(s) {
    const m = {'Booked':'bt','Pending':'bp','In Transit':'bo','Dispatched to Hub':'bh','Arrived at Hub':'bh','Out for Delivery':'bo','Delivered':'bd','Exception / Held':'be'};
    return `<span class="badge ${m[s]||'bp'}">${s||'Pending'}</span>`;
}
function fmt(v) { if (!v) return '—'; const d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function initial(name) { return String(name || 'U').charAt(0).toUpperCase(); }

// ─────────────────────────────────────────────────────────
// CLOUD WHATSAPP ENGINE & PLACEHOLDERS
// ─────────────────────────────────────────────────────────
let waCloudTemplates = null;

async function fetchCloudTemplates() {
    try {
        const res = await fetch(`${SCRIPT_URL}?action=getTemplates`);
        const json = await res.json();
        if (json.result === 'success' && json.data) {
            waCloudTemplates = json.data;
        }
    } catch (e) { console.error("Failed to fetch custom WA templates."); }
}

function sendWAByAwb(awb) {
    const row = allRows.find(r => r[0] === awb || r[1] === awb);
    if (!row) return;

    let phone, shipper, consignee, status, origin, dest, weight, boxes, originFlag, destFlag;
    
    if (currentView === 'domestic') {
        phone = row[4]; shipper = row[3]; consignee = row[10]; status = row[22];
        origin = row[7] || 'Origin'; dest = row[14] || 'Destination';
        weight = row[19] || '0'; boxes = '1';
        originFlag = '🇮🇳'; destFlag = '🇮🇳'; // Domestic implicit flag assumption
    } else {
        phone = row[4]; shipper = row[3]; consignee = row[12]; status = row[34];
        
        const oData = getCountryDetails(row[8]);
        const dData = getCountryDetails(row[17]);
        
        origin = oData.name; originFlag = oData.flag;
        dest = dData.name; destFlag = dData.flag;
        
        weight = row[28] || '0'; boxes = row[26] || '1';
    }

    if (!phone || phone === '—') return alert('No phone number attached to this shipper.');
    let cleanPhone = String(phone).replace(/[^0-9]/g, '');
    if (cleanPhone.length < 8) return alert('Invalid phone number format: ' + phone);

    const defTpl = {
        'booked': 'Hello [SHIPPER_NAME], your [TOTAL_WEIGHT]kg shipment (AWB: [AWB]) to [DESTINATION] [DEST_FLAG] has been successfully booked.',
        'hub': 'Hello [CONSIGNEE_NAME], an update! Your shipment (AWB: [AWB]) is processing at our hub.',
        'transit': 'Hello [CONSIGNEE_NAME], your shipment (AWB: [AWB]) is now safely in transit to [DESTINATION] [DEST_FLAG].',
        'ofd': 'Hello [CONSIGNEE_NAME], great news! Your shipment (AWB: [AWB]) is out for delivery today.',
        'delivered': 'Hello [SHIPPER_NAME], your shipment (AWB: [AWB]) has been delivered. Thank you!',
        'exception': 'Hello [SHIPPER_NAME], there is an issue regarding your shipment (AWB: [AWB]). Status: [STATUS]. Please contact us.',
        'default': 'Hello [SHIPPER_NAME], there is an update regarding your shipment (AWB: [AWB]). Status: [STATUS].'
    };

    const tplSource = waCloudTemplates || defTpl;
    let rawMsg = '';
    const s = String(status).toLowerCase();
    
    if (s.includes('booked') || s.includes('pending')) rawMsg = tplSource.booked || defTpl.booked;
    else if (s.includes('hub')) rawMsg = tplSource.hub || defTpl.hub;
    else if (s.includes('transit')) rawMsg = tplSource.transit || defTpl.transit;
    else if (s.includes('delivery')) rawMsg = tplSource.ofd || defTpl.ofd;
    else if (s.includes('delivered')) rawMsg = tplSource.delivered || defTpl.delivered;
    else if (s.includes('exception') || s.includes('held')) rawMsg = tplSource.exception || defTpl.exception;
    else rawMsg = tplSource.default || defTpl.default;

    // Advanced Data Replacement
    let finalMsg = rawMsg
        .replace(/\[SHIPPER_NAME\]/g, shipper)
        .replace(/\[CONSIGNEE_NAME\]/g, consignee)
        .replace(/\[AWB\]/g, awb)
        .replace(/\[STATUS\]/g, status)
        .replace(/\[ORIGIN\]/g, origin)
        .replace(/\[ORIGIN_FLAG\]/g, originFlag)
        .replace(/\[DESTINATION\]/g, dest)
        .replace(/\[DEST_FLAG\]/g, destFlag)
        .replace(/\[TOTAL_WEIGHT\]/g, weight)
        .replace(/\[NO_OF_BOXES\]/g, boxes);

    window.open(`https://web.whatsapp.com/send?phone=${cleanPhone}&text=${encodeURIComponent(finalMsg)}`, '_blank');
}

// ─────────────────────────────────────────────────────────
// PRINT TEMPLATE ENGINE
// ─────────────────────────────────────────────────────────
function printLabel(awb, type) {
    const row = allRows.find(r => r[0] === awb || r[1] === awb);
    if (!row) return;
    localStorage.setItem('nuvana_print_row', JSON.stringify(row));
    localStorage.setItem('nuvana_print_type', type);
    window.open('templates/waybill-label.html', '_blank', 'width=500,height=750');
}

function printInvoice(awb, type) {
    const row = allRows.find(r => r[0] === awb || r[1] === awb);
    if (!row) return;
    localStorage.setItem('nuvana_print_row', JSON.stringify(row));
    localStorage.setItem('nuvana_print_type', type);
    
    if (type === 'international') {
        window.open('templates/internationalinvoice.html', '_blank', 'width=800,height=900');
    } else {
        window.open('templates/invoice.html', '_blank', 'width=800,height=900');
    }
}

// ─────────────────────────────────────────────────────────
// DRAWER VIEW ENGINE
// ─────────────────────────────────────────────────────────
function openDrawerByAwb(awb) {
    const row = allRows.find(r => r[0] === awb || r[1] === awb);
    if (!row) return;

    if (currentView === 'domestic') {
        openDrawer(awb, `Domestic`, [
            ["Date", fmt(row[0])], ["Sender", String(row[3])], ["Sender Phone", String(row[4])],
            ["Sender City", String(row[7])], ["Receiver", String(row[10])], ["Receiver Phone", String(row[11])],
            ["Dest City", String(row[14])], ["Weight", String(row[19] || 0) + " kg"],
            ["Total", "₹" + String(row[21] || 0)], ["Status", badge(String(row[22]))]
        ]);
    } else {
        openDrawer(awb, `International`, [
            ["Date", fmt(row[1])], ["Sender", String(row[3])], ["Sender Phone", String(row[4])],
            ["Sender Country", String(row[8])], ["Receiver", String(row[12])], ["Receiver Phone", String(row[13])],
            ["Dest Country", String(row[17])], ["Boxes", String(row[26] || 0)],
            ["Chargeable Wt", String(row[28] || 0) + " kg"], ["Grand Total", "OMR " + String(row[32] || 0)],
            ["Status", badge(String(row[34]))]
        ]);
    }
}
function openDrawer(title, sub, fields) {
    document.getElementById('drawerTitle').textContent = title; document.getElementById('drawerSub').textContent = sub;
    document.getElementById('drawerBody').innerHTML = fields.map(([l,v]) => `<div class="detail-row"><span class="d-label">${l}</span><span class="d-value">${v||'—'}</span></div>`).join('');
    document.getElementById('detailDrawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() { document.getElementById('detailDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

// ─────────────────────────────────────────────────────────
// COMPLETE EDIT ENGINE
// ─────────────────────────────────────────────────────────
function openEditByAwb(awb) {
    const row = allRows.find(r => r[0] === awb || r[1] === awb);
    if (!row) return;

    document.getElementById('editModal').classList.remove('hidden');
    document.getElementById('editModal').classList.add('flex');
    document.getElementById('editAwb').value = awb;
    document.getElementById('editModalAwb').textContent = "AWB: " + awb;
    
    if (currentView === 'domestic') {
        document.getElementById('editType').value = 'domestic';
        document.getElementById('editSender').value   = row[3] || '';
        document.getElementById('editSPhone').value   = row[4] || '';
        document.getElementById('editReceiver').value = row[10] || '';
        document.getElementById('editRPhone').value   = row[11] || '';
        document.getElementById('editWeight').value   = row[19] || '0';
        document.getElementById('editTotal').value    = row[21] || '0';
        document.getElementById('editStatus').value   = row[22] || 'Booked';
    } else {
        document.getElementById('editType').value = 'international';
        document.getElementById('editSender').value   = row[3] || '';
        document.getElementById('editSPhone').value   = row[4] || '';
        document.getElementById('editReceiver').value = row[12] || '';
        document.getElementById('editRPhone').value   = row[13] || '';
        document.getElementById('editWeight').value   = row[28] || '0';
        document.getElementById('editTotal').value    = row[32] || '0';
        document.getElementById('editStatus').value   = row[34] || 'Booked';
    }
}
function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); document.getElementById('editModal').classList.remove('flex'); }

document.getElementById('editForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('editSaveBtn'); btn.disabled = true; btn.textContent = "Saving...";
    
    const payload = {
        formType: 'editBooking',
        bookingType: document.getElementById('editType').value,
        awb: document.getElementById('editAwb').value,
        senderName: document.getElementById('editSender').value,
        senderPhone: document.getElementById('editSPhone').value,
        receiverName: document.getElementById('editReceiver').value,
        receiverPhone: document.getElementById('editRPhone').value,
        weight: document.getElementById('editWeight').value,
        total: document.getElementById('editTotal').value,
        status: document.getElementById('editStatus').value
    };
    
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.result === 'success') { closeEditModal(); window.fetchBookings(); } else alert(data.error);
    } catch(err) { alert("Network Error"); } finally { btn.disabled = false; btn.textContent = "Save Master Record"; }
});

// ─────────────────────────────────────────────────────────
// DELETE ENGINE
// ─────────────────────────────────────────────────────────
async function deleteRow(awb, type) {
    if(!confirm(`Are you absolutely sure you want to permanently delete booking ${awb}?`)) return;
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({formType: 'deleteBooking', awb: awb, bookingType: type}) });
        const data = await res.json();
        if (data.result === 'success') window.fetchBookings(); else alert(data.error);
    } catch(err) { alert("Network Error"); }
}

// ─────────────────────────────────────────────────────────
// TABLE RENDERER
// ─────────────────────────────────────────────────────────
function renderTable(rows) {
    const tbody = document.getElementById('bookingsTableBody');
    if (!tbody) return;

    if (!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-16"><p class="text-charcoal font-bold font-lexend">No Records Found</p><p class="text-xs text-teal/50">There are no bookings matching your criteria.</p></td></tr>`;
        document.getElementById('rowCountLabel').textContent = '0 Records'; return;
    }

    tbody.innerHTML = '';
    let successCount = 0;

    rows.forEach(r => {
        try {
            const tr = document.createElement('tr');
            
            let awb, date, sender, sPhone, origin, receiver, rPhone, dest, status;

            if (currentView === 'domestic') {
                date = r[0]; awb = String(r[1]||'—'); sender = String(r[3]||'—'); sPhone = String(r[4]||'—');
                origin = String(r[7]||'ORG').substring(0,5); 
                receiver = String(r[10]||'—'); rPhone = String(r[11]||'—'); 
                dest = String(r[14]||'DST').substring(0,5); 
                status = String(r[22]||'Pending');
            } else {
                awb = String(r[0]||'—'); date = r[1]; sender = String(r[3]||'—'); sPhone = String(r[4]||'—');
                
                // Fetch Alpha-3 Codes via helper
                const oData = getCountryDetails(String(r[8]||''));
                const dData = getCountryDetails(String(r[17]||''));
                
                origin = oData.alpha3; 
                receiver = String(r[12]||'—'); rPhone = String(r[13]||'—'); 
                dest = dData.alpha3; 
                
                status = String(r[34]||'Pending');
            }
            
            tr.innerHTML = `
                <td>
                    <div class="font-lexend font-bold ${currentView==='domestic' ? 'text-teal' : 'text-orange'} text-[13px]">${awb}</div>
                    <div class="text-[10px] text-teal/50 mt-0.5">${fmt(date)}</div>
                </td>
                <td>
                    <div class="flex items-center gap-3">
                        <div class="avatar-circle bg-teal/10 text-teal">${initial(sender)}</div>
                        <div><div class="font-bold text-charcoal text-xs">${sender}</div><div class="text-[10px] text-gray-400 font-mono">${sPhone}</div></div>
                    </div>
                </td>
                <td>
                    <div class="flex flex-col items-center justify-center">
                        <div class="text-[9px] font-bold text-charcoal uppercase">${origin}</div>
                        <svg class="w-3 h-3 text-gray-300 my-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                        <div class="text-[9px] font-bold text-orange uppercase">${dest}</div>
                    </div>
                </td>
                <td>
                    <div class="flex items-center gap-3">
                        <div class="avatar-circle bg-orange/10 text-orange">${initial(receiver)}</div>
                        <div><div class="font-bold text-charcoal text-xs">${receiver}</div><div class="text-[10px] text-gray-400 font-mono">${rPhone}</div></div>
                    </div>
                </td>
                <td class="text-center">${badge(status)}</td>
                <td class="text-right">
                    <div class="flex justify-end gap-1">
                        <button onclick="printLabel('${awb}', '${currentView}')" class="action-btn ab-lbl" title="Print Label"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg></button>
                        <button onclick="printInvoice('${awb}', '${currentView}')" class="action-btn ab-inv" title="Print Invoice"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></button>

                        <button onclick="openDrawerByAwb('${awb}')" class="action-btn ab-view" title="View"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                        <button onclick="openEditByAwb('${awb}')" class="action-btn ab-edit" title="Edit"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                        <button onclick="deleteRow('${awb}', '${currentView}')" class="action-btn ab-del" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                </td>`;
            tbody.appendChild(tr);
            successCount++;
        } catch(e) {}
    });
    
    document.getElementById('rowCountLabel').textContent = `${successCount} Total Records`;
}

document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) return renderTable(allRows);
    renderTable(allRows.filter(r => r.join(' ').toLowerCase().includes(q)));
});

window.fetchBookings = async function() {
    const tbody = document.getElementById('bookingsTableBody');
    if (!tbody) return; 
    
    const fetchTarget = currentView;
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10"><div class="animate-pulse text-teal/40 text-xs font-bold uppercase tracking-widest">Loading Records...</div></td></tr>`;
    
    try {
        const ep = fetchTarget === 'domestic' ? 'getDomestic' : 'getInternational';
        const res = await fetch(`${SCRIPT_URL}?action=${ep}`);
        const result = await res.json();
        
        if (currentView !== fetchTarget) return;

        if (result.result === 'success') {
            let rawRows = result.data.length > 1 ? [...result.data].slice(1).reverse() : [];
            
            if (userRole !== 'Admin' && userBranch !== 'UNKNOWN' && userBranch !== 'ALL') {
                rawRows = rawRows.filter(r => String(r[2]).trim().toUpperCase() === String(userBranch).trim().toUpperCase());
            }

            allRows = rawRows;
            renderTable(allRows);
        } else {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-danger font-bold text-sm">Failed to load data: ${result.message}</td></tr>`;
        }
    } catch(e) { 
        if (currentView === fetchTarget) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-danger font-bold text-sm">Connection failed. Please refresh.</td></tr>`;
        }
    }
};

document.getElementById('toggleDomBtn').addEventListener('click', () => {
    if (currentView === 'domestic') return; 
    currentView = 'domestic';
    document.getElementById('toggleDomBtn').className = 'tab-btn tab-dom'; document.getElementById('toggleIntBtn').className = 'tab-btn tab-off';
    closeDrawer(); window.fetchBookings();
});

document.getElementById('toggleIntBtn').addEventListener('click', () => {
    if (currentView === 'international') return; 
    currentView = 'international';
    document.getElementById('toggleIntBtn').className = 'tab-btn tab-int'; document.getElementById('toggleDomBtn').className = 'tab-btn tab-off';
    closeDrawer(); window.fetchBookings();
});

document.addEventListener('DOMContentLoaded', () => {
    fetchCloudTemplates();
    window.fetchBookings();
});
</script>
