<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvana.ex ERP — Manage Bookings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>document.documentElement.classList.remove('dark');</script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { orange:'#F99523',teal:'#027385',beige:'#EFE7DC',charcoal:'#0D2330',success:'#10B981', danger:'#ef4444' }, fontFamily:{ poppins:['Poppins','sans-serif'],lexend:['Lexend','sans-serif'] } } }
        }
    </script>
    <style>
        *{box-sizing:border-box;} body{font-family:'Poppins',sans-serif;background:#f5f2ee;} .font-lexend{font-family:'Lexend',sans-serif;}
        @keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeRow{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .anim-1{animation:slideUp .4s cubic-bezier(.16,1,.3,1) .05s both;} .anim-2{animation:slideUp .4s cubic-bezier(.16,1,.3,1) .1s both;}
        .spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
        .fade-row{animation:fadeRow .25s ease both;}
        
        ::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(2,115,133,.18);border-radius:10px;}
        
        .tab-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Lexend',sans-serif;border:none;}
        .tab-dom{background:#027385;color:white;box-shadow:0 3px 10px rgba(2,115,133,.3);}
        .tab-int{background:#F99523;color:white;box-shadow:0 3px 10px rgba(249,149,35,.3);}
        .tab-off{background:transparent;color:rgba(13,35,48,.4);} .tab-off:hover{background:rgba(2,115,133,.06);color:#0D2330;}
        
        .search-input{background:white;border:1px solid #e8e0d6;border-radius:10px;padding:.5rem .85rem .5rem 2.2rem;font-family:'Poppins',sans-serif;font-size:.8rem;color:#0D2330;outline:none;width:240px;transition:all .2s;}
        .search-input:focus{border-color:#F99523;box-shadow:0 0 0 3px rgba(249,149,35,.1);width:280px;}
        
        .data-table{width:100%;border-collapse:separate; border-spacing: 0 8px;}
        .data-table thead th{padding:0 16px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(2,115,133,.55);border-bottom:1px solid #e8e0d6;}
        .data-table tbody tr{background:white;box-shadow:0 2px 8px rgba(13,35,48,.04);transition:transform .2s, box-shadow .2s; border-radius: 12px;}
        .data-table tbody tr:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(13,35,48,.08);}
        .data-table tbody td{padding:14px 16px;font-size:13px;color:#374151; vertical-align: middle;}
        .data-table tbody td:first-child{border-top-left-radius: 12px; border-bottom-left-radius: 12px;}
        .data-table tbody td:last-child{border-top-right-radius: 12px; border-bottom-right-radius: 12px;}
        
        .badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;font-family:'Lexend',sans-serif;white-space:nowrap;}
        .bp{background:#fef9c3;color:#a16207;} .bt{background:#dbeafe;color:#1d4ed8;} .bh{background:#f3e8ff;color:#7e22ce;}
        .bd{background:#dcfce7;color:#15803d;} .be{background:#fee2e2;color:#b91c1c;} .bo{background:#ffedd5;color:#c2410c;}
        
        .avatar-circle {width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; font-family:'Lexend',sans-serif;}
        
        .action-btn {width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; cursor:pointer;}
        .ab-view {background:rgba(2,115,133,0.1); color:#027385;} .ab-view:hover {background:#027385; color:white;}
        .ab-edit {background:rgba(249,149,35,0.1); color:#F99523;} .ab-edit:hover {background:#F99523; color:white;}
        .ab-del {background:rgba(239,68,68,0.1); color:#ef4444;} .ab-del:hover {background:#ef4444; color:white;}

        .detail-drawer{position:fixed;right:0;top:0;bottom:0;width:400px;background:white;box-shadow:-8px 0 32px rgba(13,35,48,.1);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);}
        .detail-drawer.open{transform:translateX(0);}
        .drawer-overlay{position:fixed;inset:0;background:rgba(13,35,48,.25);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s;}
        .drawer-overlay.open{opacity:1;pointer-events:all;}
        
        .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #f0ece6;gap:12px;}
        .detail-row:last-child{border-bottom:none;}
        .d-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(2,115,133,.5);flex-shrink:0;}
        .d-value{font-size:13px;font-weight:600;color:#0D2330;text-align:right;}

        .modal-card {background:white; border-radius:20px; width:100%; max-width:400px; box-shadow:0 20px 40px rgba(0,0,0,0.2); padding:24px; position:relative;}
        .field-modal {width:100%; background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:13px; outline:none; transition:border 0.2s;}
        .field-modal:focus {border-color:#F99523;}
    </style>
</head>
<body class="min-h-screen flex overflow-hidden">

<div id="global-sidebar-container" class="flex-shrink-0 z-20"></div>

<div class="drawer-overlay" id="drawerOverlay"></div>

<div class="detail-drawer" id="detailDrawer">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid #f0ece6;background:#faf8f5;">
        <div>
            <h3 class="font-lexend text-lg font-bold text-charcoal" id="drawerTitle">Details</h3>
            <p class="text-[11px] text-teal/60 mt-0.5" id="drawerSub">—</p>
        </div>
        <button id="closeDrawer" style="width:36px;height:36px;border-radius:50%;background:rgba(13,35,48,.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;">
            <svg style="width:16px;height:16px;color:#0D2330;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px;" id="drawerBody"></div>
    <div style="padding:20px;border-top:1px solid #f0ece6;background:#faf8f5;">
        <a href="update.html" class="w-full py-3 rounded-xl bg-charcoal text-white font-lexend text-sm font-bold flex justify-center items-center gap-2 hover:bg-charcoal/90 transition shadow-lg">
            Update Shipment Status
        </a>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-charcoal/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="modal-card">
        <h2 class="font-lexend text-lg font-bold text-charcoal mb-1">Quick Edit</h2>
        <p class="text-xs text-teal/60 mb-5" id="editModalAwb">AWB: —</p>
        
        <form id="editForm" class="space-y-4">
            <input type="hidden" id="editAwb">
            <input type="hidden" id="editType">
            <div><label class="d-label">Sender Name</label><input type="text" id="editSender" class="field-modal mt-1" required></div>
            <div><label class="d-label">Receiver Name</label><input type="text" id="editReceiver" class="field-modal mt-1" required></div>
            <div>
                <label class="d-label">Status</label>
                <select id="editStatus" class="field-modal mt-1" required>
                    <option value="Booked">Booked</option><option value="Dispatched to Hub">Dispatched to Hub</option>
                    <option value="In Transit">In Transit</option><option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option><option value="Exception / Held">Exception / Held</option>
                </select>
            </div>
            <div class="flex gap-3 pt-4 border-t border-gray-100">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold text-sm hover:bg-gray-200 transition">Cancel</button>
                <button type="submit" id="editSaveBtn" class="flex-1 py-2.5 rounded-lg bg-orange text-white font-bold text-sm hover:bg-orange/90 transition shadow-md">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<main style="flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;">
    <header style="height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid #e8e0d6;flex-shrink:0;z-index:10;">
        <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:32px;height:32px;border-radius:10px;background:rgba(2,115,133,.1);display:flex;align-items:center;justify-content:center;">
                <svg style="width:16px;height:16px;color:#027385;" viewBox="0 0 24 24" fill="currentColor"><path d="M3.375 3C2.339 3 1.5 3.84 1.5 4.875v.75c0 1.036.84 1.875 1.875 1.875h17.25c1.035 0 1.875-.84 1.875-1.875v-.75C22.5 3.839 21.66 3 20.625 3H3.375z"/><path fill-rule="evenodd" d="M3.087 9l.54 9.176A3 3 0 006.622 21h10.757a3 3 0 002.995-2.824L20.913 9H3.087z" clip-rule="evenodd"/></svg>
            </div>
            <div>
                <h2 class="font-lexend text-[14px] font-semibold text-charcoal">Logistics Queue</h2>
                <p class="text-[10px] text-teal/60">Manage your active shipments and tracking records</p>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:#f0ece6;border:1px solid #ddd5c8;">
                <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                <span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0D2330;">API Online</span>
            </div>
        </div>
    </header>

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;padding:24px;gap:20px;">

        <div class="flex items-center justify-between anim-1">
            <div class="flex items-center gap-2 p-1.5 rounded-xl bg-[#e8e0d6]">
                <button id="toggleDomBtn" class="tab-btn tab-dom">Domestic Queue</button>
                <button id="toggleIntBtn" class="tab-btn tab-off">International Queue</button>
            </div>
            <div class="flex items-center gap-3">
                <div style="position:relative;">
                    <svg class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-teal/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Search AWB or Name..." class="search-input">
                </div>
                <button onclick="window.fetchBookings()" class="px-4 py-2 bg-white border border-[#e8e0d6] rounded-xl text-xs font-bold text-charcoal hover:bg-gray-50 transition shadow-sm">
                    Refresh
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto pr-2 anim-2">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="w-[18%]">Waybill (AWB)</th>
                        <th class="w-[22%]">Shipper</th>
                        <th class="w-[10%]">Route</th>
                        <th class="w-[22%]">Receiver</th>
                        <th class="w-[15%]">Status</th>
                        <th class="w-[13%] text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="6" class="text-center py-10"><div class="animate-pulse text-teal/40 text-xs font-bold uppercase tracking-widest">Loading Records...</div></td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="flex justify-between items-center text-xs text-teal/50 font-semibold px-2">
            <span id="rowCountLabel">Loading...</span>
        </div>
    </div>
</main>

<script src="app.js"></script>
<script>
// Safely locate the script URL
const SCRIPT_URL = (typeof _globalConfig !== 'undefined') ? _globalConfig.scriptURL : 'https://script.google.com/macros/s/AKfycbweIJLcyZTR619HQgD3IJvHI2Dn-3EnT7WEo3g0pKeCsPdPZCeSnhyonP_1QQjd5pQw/exec';
let currentView = 'domestic';
let allRows = [];

// Formatting Helpers
function badge(s) {
    const m = {'Booked':'bt','Pending':'bp','In Transit':'bo','Dispatched to Hub':'bh','Arrived at Hub':'bh','Out for Delivery':'bo','Delivered':'bd','Exception / Held':'be'};
    return `<span class="badge ${m[s]||'bp'}">${s||'Pending'}</span>`;
}
function fmt(v) { if (!v) return '—'; const d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function initial(name) { return String(name || 'U').charAt(0).toUpperCase(); }

// Drawer View Functions
function openDrawer(title, sub, fields) {
    document.getElementById('drawerTitle').textContent = title;
    document.getElementById('drawerSub').textContent = sub;
    document.getElementById('drawerBody').innerHTML = fields.map(([l,v]) => `<div class="detail-row"><span class="d-label">${l}</span><span class="d-value">${v||'—'}</span></div>`).join('');
    document.getElementById('detailDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() { 
    document.getElementById('detailDrawer').classList.remove('open'); 
    document.getElementById('drawerOverlay').classList.remove('open'); 
}
document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

// Edit Modal Functions
function openEdit(awb, sender, receiver, status, type) {
    document.getElementById('editModal').classList.remove('hidden');
    document.getElementById('editModal').classList.add('flex');
    document.getElementById('editAwb').value = awb;
    document.getElementById('editModalAwb').textContent = "AWB: " + awb;
    document.getElementById('editType').value = type;
    document.getElementById('editSender').value = sender;
    document.getElementById('editReceiver').value = receiver;
    document.getElementById('editStatus').value = status || 'Booked';
}
function closeEditModal() { 
    document.getElementById('editModal').classList.add('hidden'); 
    document.getElementById('editModal').classList.remove('flex'); 
}

document.getElementById('editForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('editSaveBtn'); btn.disabled = true; btn.textContent = "Saving...";
    const payload = {
        formType: 'editBooking',
        bookingType: document.getElementById('editType').value,
        awb: document.getElementById('editAwb').value,
        senderName: document.getElementById('editSender').value,
        receiverName: document.getElementById('editReceiver').value,
        status: document.getElementById('editStatus').value
    };
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.result === 'success') { closeEditModal(); window.fetchBookings(); } else alert(data.error);
    } catch(err) { alert("Network Error"); } finally { btn.disabled = false; btn.textContent = "Save Changes"; }
});

// Delete Logic
async function deleteRow(awb, type) {
    if(!confirm(`Are you absolutely sure you want to permanently delete booking ${awb}?`)) return;
    try {
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({formType: 'deleteBooking', awb: awb, bookingType: type}) });
        const data = await res.json();
        if (data.result === 'success') window.fetchBookings(); else alert(data.error);
    } catch(err) { alert("Network Error"); }
}

// Ultra-Safe Table Renderer
function renderTable(rows) {
    const tbody = document.getElementById('bookingsTableBody');
    if (!tbody) return;

    if (!rows || rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-16"><p class="text-charcoal font-bold font-lexend">No Records Found</p><p class="text-xs text-teal/50">There are no bookings matching your criteria.</p></td></tr>`;
        document.getElementById('rowCountLabel').textContent = '0 Records'; return;
    }

    tbody.innerHTML = '';
    let successCount = 0;

    rows.forEach(r => {
        try {
            const tr = document.createElement('tr');
            
            if (currentView === 'domestic') {
                // Ensure every variable is safely parsed as a string to prevent .substring() crashes
                const date     = r[0];
                const awb      = String(r[1]  || '—');
                const sender   = String(r[3]  || '—');
                const sPhone   = String(r[4]  || '—');
                const origin   = String(r[7]  || 'ORG');
                const receiver = String(r[10] || '—');
                const rPhone   = String(r[11] || '—');
                const dest     = String(r[14] || 'DST');
                const status   = String(r[22] || 'Pending');
                const weight   = String(r[19] || '0');
                const total    = String(r[21] || '0');
                
                tr.innerHTML = `
                    <td>
                        <div class="font-lexend font-bold text-teal text-[13px]">${awb}</div>
                        <div class="text-[10px] text-teal/50 mt-0.5">${fmt(date)}</div>
                    </td>
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="avatar-circle bg-teal/10 text-teal">${initial(sender)}</div>
                            <div><div class="font-bold text-charcoal text-xs">${sender}</div><div class="text-[10px] text-gray-400 font-mono">${sPhone}</div></div>
                        </div>
                    </td>
                    <td>
                        <div class="flex flex-col items-center justify-center">
                            <div class="text-[9px] font-bold text-charcoal uppercase">${origin.substring(0,6)}</div>
                            <svg class="w-3 h-3 text-gray-300 my-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                            <div class="text-[9px] font-bold text-orange uppercase">${dest.substring(0,6)}</div>
                        </div>
                    </td>
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="avatar-circle bg-orange/10 text-orange">${initial(receiver)}</div>
                            <div><div class="font-bold text-charcoal text-xs">${receiver}</div><div class="text-[10px] text-gray-400 font-mono">${rPhone}</div></div>
                        </div>
                    </td>
                    <td>${badge(status)}</td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openDrawer("${awb}","Domestic", [["Date","${fmt(date)}"],["Sender","${sender}"],["Sender City","${origin}"],["Receiver","${receiver}"],["Dest City","${dest}"],["Weight","${weight} kg"],["Total","₹${total}"],["Status","${status}"]])' class="action-btn ab-view" title="View"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                            <button onclick='openEdit("${awb}", "${sender}", "${receiver}", "${status}", "domestic")' class="action-btn ab-edit" title="Edit"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                            <button onclick='deleteRow("${awb}", "domestic")' class="action-btn ab-del" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    </td>`;
            } else {
                // Ultra-Safe International Caster
                const awb      = String(r[0]  || '—');
                const date     = r[1];
                const sender   = String(r[3]  || '—');
                const sPhone   = String(r[4]  || '—');
                const origin   = String(r[8]  || 'ORG');
                const receiver = String(r[12] || '—');
                const rPhone   = String(r[13] || '—');
                const dest     = String(r[17] || 'DST');
                const boxes    = String(r[26] || '0');
                const cWeight  = String(r[28] || '0');
                const total    = String(r[32] || '0');
                const status   = String(r[34] || 'Pending');
                
                tr.innerHTML = `
                    <td>
                        <div class="font-lexend font-bold text-orange text-[13px]">${awb}</div>
                        <div class="text-[10px] text-teal/50 mt-0.5">${fmt(date)}</div>
                    </td>
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="avatar-circle bg-teal/10 text-teal">${initial(sender)}</div>
                            <div><div class="font-bold text-charcoal text-xs">${sender}</div><div class="text-[10px] text-gray-400 font-mono">${sPhone}</div></div>
                        </div>
                    </td>
                    <td>
                        <div class="flex flex-col items-center justify-center">
                            <div class="text-[9px] font-bold text-charcoal uppercase">${origin.substring(0,3)}</div>
                            <svg class="w-3 h-3 text-gray-300 my-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                            <div class="text-[9px] font-bold text-orange uppercase">${dest.substring(0,3)}</div>
                        </div>
                    </td>
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="avatar-circle bg-orange/10 text-orange">${initial(receiver)}</div>
                            <div><div class="font-bold text-charcoal text-xs">${receiver}</div><div class="text-[10px] text-gray-400 font-mono">${rPhone}</div></div>
                        </div>
                    </td>
                    <td>${badge(status)}</td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openDrawer("${awb}","International", [["Date","${fmt(date)}"],["Sender","${sender}"],["Sender Country","${origin}"],["Receiver","${receiver}"],["Dest Country","${dest}"],["Boxes","${boxes}"],["Chargeable Wt","${cWeight} kg"],["Grand Total","OMR ${total}"],["Status","${status}"]])' class="action-btn ab-view" title="View"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                            <button onclick='openEdit("${awb}", "${sender}", "${receiver}", "${status}", "international")' class="action-btn ab-edit" title="Edit"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                            <button onclick='deleteRow("${awb}", "international")' class="action-btn ab-del" title="Delete"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    </td>`;
            }
            tbody.appendChild(tr);
            successCount++;
        } catch(e) {
            // Silently ignore broken rows so the app doesn't crash
            console.warn("Skipped an unreadable row in database");
        }
    });
    
    document.getElementById('rowCountLabel').textContent = `${successCount} Total Records`;
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) return renderTable(allRows);
    renderTable(allRows.filter(r => r.join(' ').toLowerCase().includes(q)));
});

// Locked Fetch Data Function
window.fetchBookings = async function() {
    const tbody = document.getElementById('bookingsTableBody');
    if (!tbody) return; 
    
    const fetchTarget = currentView;
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10"><div class="animate-pulse text-teal/40 text-xs font-bold uppercase tracking-widest">Loading Records...</div></td></tr>`;
    
    try {
        const ep = fetchTarget === 'domestic' ? 'getDomestic' : 'getInternational';
        const res = await fetch(`${SCRIPT_URL}?action=${ep}`);
        const result = await res.json();
        
        if (currentView !== fetchTarget) return;

        if (result.result === 'success') {
            allRows = result.data.length > 1 ? [...result.data].slice(1).reverse() : [];
            renderTable(allRows);
        } else {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-danger font-bold text-sm">Failed to load data: ${result.message}</td></tr>`;
        }
    } catch(e) { 
        if (currentView === fetchTarget) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-danger font-bold text-sm">Connection failed. Please refresh.</td></tr>`;
        }
    }
};

// Tabs
document.getElementById('toggleDomBtn').addEventListener('click', () => {
    if (currentView === 'domestic') return; 
    currentView = 'domestic';
    document.getElementById('toggleDomBtn').className = 'tab-btn tab-dom'; 
    document.getElementById('toggleIntBtn').className = 'tab-btn tab-off';
    closeDrawer(); window.fetchBookings();
});

document.getElementById('toggleIntBtn').addEventListener('click', () => {
    if (currentView === 'international') return; 
    currentView = 'international';
    document.getElementById('toggleIntBtn').className = 'tab-btn tab-int'; 
    document.getElementById('toggleDomBtn').className = 'tab-btn tab-off';
    closeDrawer(); window.fetchBookings();
});

document.addEventListener('DOMContentLoaded', window.fetchBookings);
</script>
</body>
</html>
