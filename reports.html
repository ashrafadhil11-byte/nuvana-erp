<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics & Reports - Nuvana.ex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex overflow-hidden">

    <aside class="w-64 glass-panel border-r border-slate-700 transition-all duration-300 flex flex-col z-20">
        <div class="p-6 flex justify-between items-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">NUVANA.EX</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="index.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Dashboard</a>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>New Booking</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="international.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">International</a>
                    <a href="domestic.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Domestic</a>
                </div>
            </div>
            
            <div class="group relative cursor-pointer">
                <div class="w-full flex justify-between items-center px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">
                    <span>Processing</span>
                    <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="hidden group-hover:block pl-6 pr-4 py-2 space-y-1">
                    <a href="processing.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Manage Bookings</a>
                    <a href="update.html" class="block px-2 py-1 text-sm text-slate-400 hover:text-white transition">Process Update</a>
                </div>
            </div>

            <a href="accounts.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Accounts</a>
            <a href="customers.html" class="block px-4 py-2 text-slate-300 hover:bg-slate-800 rounded-lg transition">Customers</a>
            <a href="reports.html" class="block px-4 py-2 rounded-lg bg-pink-600 bg-opacity-20 text-pink-400 border border-pink-500 border-opacity-30 transition font-bold">Reports</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden" id="reportsDashboard">
        <header class="h-16 glass-panel border-b border-slate-700 flex items-center justify-between px-8 z-10">
            <h2 class="text-lg font-semibold text-slate-200">Analytics & Reports</h2>
            <div class="flex items-center space-x-4">
                <button id="generateReportsBtn" class="bg-pink-600 hover:bg-pink-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center shadow-lg shadow-pink-500/30">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh Analytics
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto relative flex flex-col gap-8">
            <div class="absolute top-0 right-1/2 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-[150px] opacity-20 pointer-events-none"></div>

            <div id="loadingOverlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-80 rounded-xl">
                <div class="animate-pulse text-pink-400 font-bold text-xl tracking-widest">CRUNCHING DATA...</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 z-10">
                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600">
                    <h3 class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Total Income</h3>
                    <p class="text-2xl font-bold text-emerald-400" id="statIncome">$0.00</p>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600">
                    <h3 class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Total Expenses</h3>
                    <p class="text-2xl font-bold text-rose-400" id="statExpense">$0.00</p>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600">
                    <h3 class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Net Profit</h3>
                    <p class="text-2xl font-bold text-white" id="statProfit">$0.00</p>
                </div>
                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600">
                    <h3 class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Total Shipments</h3>
                    <p class="text-2xl font-bold text-blue-400" id="statShipments">0</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 z-10">
                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600 flex flex-col items-center">
                    <h3 class="text-sm font-semibold text-white mb-4 w-full text-left">Cash Flow Distribution</h3>
                    <div class="relative w-full max-w-[300px] aspect-square">
                        <canvas id="financeChart"></canvas>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-xl border-t border-l border-slate-600 flex flex-col items-center">
                    <h3 class="text-sm font-semibold text-white mb-4 w-full text-left">Domestic Shipment Status</h3>
                    <div class="relative w-full aspect-video">
                        <canvas id="logisticsChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
